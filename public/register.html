<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Sign up</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <h1>Sign up</h1>
    <nav>
      <a href="/"> ← Products></a>
    </nav>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Name" required />
      <span id="name-error" class="hidden"></span>
      <input type="email" id="email" placeholder="Email" required />
      <span id="email-error" class="hidden"></span>
      <input type="password" id="password" placeholder="Password" required />
      <span id="password-error" class="hidden"></span>
      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm password"
        required
      />
      <span id="confirmPassword-error" class="hidden"></span>

      <button type="submit">Sign up</button>
    </form>

    <span id="message" class="hidden"></span>

    <script type="module" src="./scripts/validateRegistration.js"></script>
  </body>
</html>
