<!doctype html>
<html lang="en">
  <head>

    <title>Reviews</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

      <a href="/">← Products</a>
    </nav>

    <div class="reviews-header">

    <ul class="review-list" id="reviewList"></ul>

    <script type="module" src="/scripts/renderReviews.js"></script>
  </body>
</html>
